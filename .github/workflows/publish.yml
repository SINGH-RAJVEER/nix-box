name: Publish crates

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  publish:
    name: Publish workspace crates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify workspace
        run: cargo check --workspace --locked

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          crates=(nixbox-config nixbox-nix nixbox-tui nixbox)

          crate_exists() {
            local crate="$1"
            local status
            status="$(curl -sS -o /dev/null -w '%{http_code}' "https://crates.io/api/v1/crates/${crate}/${version}")"
            [[ "$status" == "200" ]]
          }

          for crate in "${crates[@]}"; do
            if crate_exists "$crate"; then
              echo "${crate} ${version} already exists on crates.io; skipping"
              continue
            fi

            echo "Publishing ${crate} ${version}"
            cargo publish -p "$crate" --locked --token "$CARGO_REGISTRY_TOKEN"
          done
