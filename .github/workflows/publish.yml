name: Publish crates

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  publish:
    name: Publish workspace crates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify workspace
        run: cargo check --workspace --locked

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          crates=(nixbox-config nixbox-nix nixbox-tui nixbox)

          for crate in "${crates[@]}"; do
            echo "Publishing ${crate} ${version}"

            if cargo publish -p "$crate" --locked 2>&1 | tee publish.log; then
              continue
            fi

            if grep -q "already exists on crates.io index" publish.log; then
              echo "${crate} ${version} already exists on crates.io; skipping"
              continue
            fi

            exit 1
          done
